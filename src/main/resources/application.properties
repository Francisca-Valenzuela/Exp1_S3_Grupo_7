spring.application.name=minimarket

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT — clave secreta inyectada por entorno, con fallback seguro para entorno local
jwt.secret=${JWT_SECRET:EstaEsUnaClaveLocalDeDesarrolloMuySeguraParaMinimarket2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS — orígenes permitidos parametrizados por entorno
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}